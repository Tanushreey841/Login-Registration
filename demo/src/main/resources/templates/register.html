<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #fff;
            padding: 35px 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group { margin-bottom: 15px; }

        label {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 5px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        input:focus, select:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 5px rgba(102,126,234,0.4);
        }

        .error {
            color: red;
            font-size: 12px;
            margin-top: 3px;
        }

        .success {
            color: green;
            margin-bottom: 10px;
        }

        .gender-group {
            display: flex;
            gap: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            margin-top: 10px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        .login-link {
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>

<body>
<div class="container">

    <h2>Create Account</h2>

    <p th:if="${message}" class="success" th:text="${message}"></p>
    <p th:if="${error}" class="error" th:text="${error}"></p>

    <form th:action="@{/register}" th:object="${user}" method="post">

       
        <div class="form-group">
            <label>Username:</label>
            <input type="text" th:field="*{username}" />
            <p th:errors="*{username}" class="error"></p>
        </div>

       
        <div class="form-group">
            <label>Email:</label>
            <input type="email" th:field="*{email}" />
            <p th:errors="*{email}" class="error"></p>
        </div>

      
        <div class="form-group">
            <label>Phone no:</label>
            <input type="text" th:field="*{phone}" id="phone" oninput="validatePhone()" />
<p id="phoneError" class="error"></p>   
<p th:errors="*{phone}" class="error"></p>
        </div>
        <script>
            function validatePhone() {
                let phone = document.getElementById("phone").value.trim();
                let error = document.getElementById("phoneError");
            
               
                if (!/^\d*$/.test(phone)) {
                    error.innerText = "Only numbers allowed!";
                    return;
                }
            
                
                if (phone.length > 10) {
                    error.innerText = "Maximum 10 digits only!";
                    return;
                }

                if (phone.length === 10) {
        error.innerText = "";
        return;
    }
            
                
                if (phone.length > 0 && phone.length < 10) {
                    error.innerText = "Phone number must be exactly 10 digits";
                    return;
                }
            
             
                error.innerText = "";
            }
            </script>
       
        <div class="form-group">
            <label>Date of Birth:</label>
            <input type="date" th:field="*{dob}" />
            <p th:errors="*{dob}" class="error"></p>
        </div>

      
        <div class="form-group">
            <label>Gender:</label>
            <div class="gender-group">
                <label><input type="radio" th:field="*{gender}" value="Male"/> Male</label>
                <label><input type="radio" th:field="*{gender}" value="Female"/> Female</label>
                <label><input type="radio" th:field="*{gender}" value="Other"/> Other</label>
            </div>
            <p th:errors="*{gender}" class="error"></p>
        </div>

        
        <div class="form-group">
            <label>Hobbies:</label>

            <label><input style="width: 50px;" type="checkbox" th:field="*{hobbies}" value="Reading"/> Reading</label>
            <label><input style="width: 50px;" type="checkbox" th:field="*{hobbies}" value="Sports"/> Sports</label>
            <label><input style="width: 50px;" type="checkbox" th:field="*{hobbies}" value="Music"/> Music</label>

            <p th:errors="*{hobbies}" class="error"></p>
        </div>

       

        
        <div class="form-group">
            <input type="password" th:field="*{password}" id="password" oninput="checkPasswordStrength()" />

<p id="strength" class="error"></p>

<p th:errors="*{password}" class="error"></p>
            <script>
                function checkPasswordStrength() {
                    let password = document.getElementById("password").value;
                    let strengthText = document.getElementById("strength");
                
                    let strongRegex = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&]).{8,}$/;
                    let mediumRegex = /^(?=.*[A-Za-z])(?=.*\d).{6,}$/;
                
                    if (password.length === 0) {
                        strengthText.innerText = "";
                    }
                    else if (strongRegex.test(password)) {
                        strengthText.innerText = "Strong password ";
                        strengthText.style.color = "green";
                    }
                    else if (mediumRegex.test(password)) {
                        strengthText.innerText = "Medium password";
                        strengthText.style.color = "orange";
                    }
                    else {
                        strengthText.innerText = "Weak password  ";
                        strengthText.style.color = "red";
                    }
                }
                </script>

<div class="form-group">
    <label>Confirm Password:</label>
    <input type="password" id="confirmPassword" oninput="checkConfirmPassword()" />
    <p id="confirmError" class="error"></p>
</div>
<script>
    function checkConfirmPassword() {
        let password = document.getElementById("password").value;
        let confirm = document.getElementById("confirmPassword").value;
        let error = document.getElementById("confirmError");
    
        if (confirm.length === 0) {
            error.innerText = "";
        } else if (password !== confirm) {
            error.innerText = "Passwords do not match!";
        } else {
            error.innerText = "Passwords match";
            error.style.color = "green";
        }
    }
    </script>
        </div>

        <button type="submit">Register</button>

    </form>

    <div class="login-link">
        <p>Already have an account? <a th:href="@{/login}">Login here</a></p>
    </div>

</div>
</body>
</html>
