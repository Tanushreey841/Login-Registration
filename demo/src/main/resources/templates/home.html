<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Home</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .username {
            color: #667eea;
            font-weight: bold;
            font-size: 20px;
        }

        .btn {
            display: block;
            margin: 10px auto;
            padding: 12px;
            width: 80%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .logout-btn {
            background: #e53935;
        }

        .logout-btn:hover {
            background: #c62828;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>
        Welcome <span class="username" th:text="${username}">User</span>!
    </h2>

    <p>You are successfully logged in.</p>

    <a th:href="@{/profile(username=${username})}" class="btn">
        View Profile
    </a>

    <a th:href="@{/change-password(username=${username})}" class="btn">
        Change Password
    </a>

    <a th:href="@{/login}" class="btn logout-btn">
        Logout
    </a>

</div>

</body>
</html>
