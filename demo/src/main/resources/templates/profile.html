<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Profile</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-weight: bold;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            margin-top: 10px;
            border-radius: 5px;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 10px;
            color: #667eea;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>My Profile</h2>

    <form th:action="@{/profile}" method="post" th:object="${user}">

        <input type="hidden" th:field="*{username}"/>

        <div class="form-group">
            <label>Email:</label>
            <input type="email" th:field="*{email}"/>
        </div>

        <div class="form-group">
            <label>Phone:</label>
            <input type="text" th:field="*{phone}"/>
        </div>

        <div class="form-group">
            <label>Gender:</label>
            <select th:field="*{gender}">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label>Hobbies:</label>

            <label><input type="checkbox" th:field="*{hobbies}" value="Reading"/> Reading</label>
            <label><input type="checkbox" th:field="*{hobbies}" value="Sports"/> Sports</label>
            <label><input type="checkbox" th:field="*{hobbies}" value="Music"/> Music</label>
        </div>

        <button type="submit">Update Profile</button>
    </form>

    <a th:href="@{/change-password(username=${user.username})}">
        Change Password
    </a>

    <a th:href="@{/home(username=${user.username})}">
        Back to Home
    </a>

</div>

</body>
</html>
