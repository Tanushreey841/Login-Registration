<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Change Password</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 35px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        input:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 5px rgba(102,126,234,0.4);
        }

        .error {
            color: red;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .success {
            color: green;
            font-size: 13px;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        .back-link {
            text-align: center;
            margin-top: 15px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Change Password</h2>

    <p th:if="${error}" class="error" th:text="${error}"></p>
    <p th:if="${message}" class="success" th:text="${message}"></p>

    <form th:action="@{/change-password}" method="post">

        <input type="hidden" name="username" th:value="${username}"/>

        <div class="form-group">
            <label>Current Password:</label>
            <input type="password" name="currentPassword" required/>
        </div>

        <div class="form-group">
            <label>New Password:</label>
            <input type="password" name="newPassword" required/>
        </div>

        <div class="form-group">
            <label>Confirm New Password:</label>
            <input type="password" name="confirmPassword" required/>
        </div>

        <button type="submit">Update Password</button>
    </form>

    <div class="back-link">
        <a th:href="@{/home(username=${username})}">
             Back to Home
        </a>
    </div>

</div>

</body>
</html>
